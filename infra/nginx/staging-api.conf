# ============================================================
# Nginx — Theja API Staging
# File: infra/nginx/staging-api.conf
# Target: /etc/nginx/sites-available/theja-api
# Symlink: ln -s /etc/nginx/sites-available/theja-api /etc/nginx/sites-enabled/
#
# Prerequisiti:
#   - PHP 8.3-FPM in esecuzione su socket Unix
#   - SSL: certificato gestito da Certbot o ALB/CloudFront
#   - Document root: /var/www/theja/apps/api/public
# ============================================================

# ─── Formato log JSON (compatibile con CloudWatch e Datadog) ─
log_format json_combined escape=json
    '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for",'
        '"x_request_id":"$http_x_request_id"'
    '}';

# ─── Redirect HTTP → HTTPS ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api-staging.theja.it;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Server HTTPS ─────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name api-staging.theja.it;

    # ─── SSL ──────────────────────────────────────────────────
    # Generato con: certbot --nginx -d api-staging.theja.it
    ssl_certificate     /etc/letsencrypt/live/api-staging.theja.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-staging.theja.it/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ─── Document root ────────────────────────────────────────
    root  /var/www/theja/apps/api/public;
    index index.php;

    # ─── Log ──────────────────────────────────────────────────
    access_log /var/log/nginx/theja-api-access.log json_combined;
    error_log  /var/log/nginx/theja-api-error.log warn;

    # ─── Limiti ───────────────────────────────────────────────
    client_max_body_size 32M;
    client_body_timeout  60s;
    send_timeout         60s;

    # ─── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types application/json application/javascript text/plain text/css;
    gzip_min_length 1024;

    # ─── Health check (senza log, per ALB/ELB) ───────────────
    location = /api/health {
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── Webhook Stripe (nessun buffering del body) ───────────
    location = /api/stripe/webhook {
        proxy_request_buffering off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── CORS — preflight OPTIONS ─────────────────────────────
    # Origini staging autorizzate
    map $http_origin $cors_origin {
        default                       "";
        "https://staging.theja.it"    "$http_origin";
        "https://api-staging.theja.it" "$http_origin";
        # Sviluppo locale (solo staging — rimuovere in prod)
        "http://localhost:3000"       "$http_origin";
        "http://127.0.0.1:3000"       "$http_origin";
    }

    location / {
        # CORS headers
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, X-Request-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Content-Length 0;
            add_header Content-Type  text/plain;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-Requested-With, X-Request-Id" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "DENY" always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM ──────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;

        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO       $fastcgi_path_info;

        # Timeout generosi per operazioni lunghe (import, report)
        fastcgi_read_timeout    120s;
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout    60s;

        # Buffer per ridurre il numero di syscall
        fastcgi_buffer_size    128k;
        fastcgi_buffers        4 256k;
        fastcgi_busy_buffers_size 256k;

        # Passa header X-Request-Id a Laravel
        fastcgi_param HTTP_X_REQUEST_ID $http_x_request_id;
    }

    # ─── Blocca accesso a file nascosti e sensibili ────────────
    location ~ /\. {
        deny all;
    }

    location ~ \.(env|log|htaccess)$ {
        deny all;
    }
}
